
<!DOCTYPE html>
<html>
<head>
    <title>Cloth Shop</title>

    <style>
        body{
            font-family: Arial;
            margin: 0;
            background-color: #f2f2f2;
        }

        header{
            background-color: black;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .products{
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px;
        }

        .card{
            background: white;
            padding: 15px;
            width: 200px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .card img{
            width: 100%;
            border-radius: 10px;
        }

        button{
            background: black;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover{
            background: orange;
        }
    </style>
</head>

<body>

<header>
    <h1>Fashion Cloth Shop</h1>
</header>

<div class="products">

    <div class="card">
        <img src="https://via.placeholder.com/200x250" alt="T-Shirt">
        <h3>T-Shirt</h3>
        <p>$20</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200x250" alt="Shirt">
        <h3>Shirt</h3>
        <p>$30</p>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/200x250" alt="Jeans">
        <h3>Jeans</h3>
        <p>$40</p>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
